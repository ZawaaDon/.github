name: Copal CI (with dependencies)

on:
  workflow_call:
    inputs:
      werror_option:
        description: 'CMake -Werror option name (e.g., COPAL_MEKF_WERROR)'
        required: true
        type: string

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
          - os: ubuntu-latest
            cxx: clang++
          - os: macos-latest
            cxx: clang++
          - os: windows-latest
            cxx: cl
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -D${{ inputs.werror_option }}=ON
          ${{ matrix.cxx != 'cl' && format('-DCMAKE_CXX_COMPILER={0}', matrix.cxx) || '' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -D${{ inputs.werror_option }}=ON

      - name: Run clang-tidy
        run: |
          SRC_FILES=$(find src -name '*.cpp' 2>/dev/null || true)
          if [ -z "$SRC_FILES" ]; then
            echo "Header-only library — skipping clang-tidy"
            exit 0
          fi
          clang-tidy -p build $SRC_FILES

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gcovr
        run: pip install gcovr

      - name: Configure with coverage
        run: cmake -B build-cov -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_CXX_FLAGS=--coverage -DCMAKE_EXE_LINKER_FLAGS=--coverage

      - name: Build
        run: cmake --build build-cov

      - name: Test
        run: ctest --test-dir build-cov --output-on-failure

      - name: Coverage report
        run: gcovr build-cov --root . --filter 'include/' --filter 'src/' --print-summary
